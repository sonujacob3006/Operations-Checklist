const SM_DATA={"id": "sm", "name": "Store Manager Daily Walk", "sections": [{"id": "s1", "title": "Section 1 \u2014 BOX EXTERIOR \u2013 OUTSIDE THE STORE", "items": [{"id": "1.1", "text": "Is the entrance to the parking area clear and not blocked?"}, {"id": "1.2", "text": "Is the Qatar national flag available and in good condition?"}, {"id": "1.3", "text": "Is the parking area clean? Are all rubbish bins empty and not damaged?"}, {"id": "1.4", "text": "Is the fire exit and fire engine parking area accessible and clear?"}, {"id": "1.5", "text": "Are the shopping trolleys clean, not damaged, and in their correct parking area?"}, {"id": "1.6", "text": "Are the special needs parking spaces available for customers?"}, {"id": "1.7", "text": "Are the parking lights working? (Check at night only \u2014 write N/A during day)"}, {"id": "1.8", "text": "Are all car shade tents clean and in good condition?"}, {"id": "1.9", "text": "Are the outside walls and area around the store clean and tidy?"}, {"id": "1.10", "text": "Are the mall entrance doors and glass clean?"}, {"id": "1.11", "text": "Is the back yard area clean and all equipment organized?"}, {"id": "1.12", "text": "Are the rubbish and cardboard containers clean and well maintained?"}, {"id": "1.13", "text": "Are delivery trucks not blocking the road or entrance?"}, {"id": "1.14", "text": "Are plants and landscaping around the store clean and properly maintained?"}, {"id": "1.15", "text": "Is the Al Meera signboard (logo) working and lit up at night? (N/A during day)"}]}, {"id": "s2", "title": "Section 2 \u2014 AL MEERA MALL AREA", "items": [{"id": "2.1", "text": "Are the entrance glass doors clean and air curtains working?"}, {"id": "2.2", "text": "Is the store opening hours sticker on the door visible and in good shape?"}, {"id": "2.3", "text": "Are all aisles and passages in front of mall tenants clean and clear?"}, {"id": "2.4", "text": "Are hand sanitizer dispensers available and filled with sanitizer?"}, {"id": "2.5", "text": "Is the food court clean at all times?"}, {"id": "2.6", "text": "Are mall tenants following rules and regulations?"}, {"id": "2.7", "text": "Are tenants only selling the items they are approved to sell?"}, {"id": "2.8", "text": "Are all fire exit doors unblocked and accessible?"}, {"id": "2.9", "text": "Are all customer toilets clean, hygienic, and in good condition (no damage)?"}, {"id": "2.10", "text": "Are cleaners checking and signing the toilet cleaning sheet every 30 minutes?"}, {"id": "2.11", "text": "Is antibacterial hand wash and tissues available in all toilets?"}, {"id": "2.12", "text": "Have all maintenance issues in the mall been reported?"}]}, {"id": "s3", "title": "Section 3 \u2014 SELLING AREA ENTRANCE", "items": [{"id": "3.1", "text": "Are charity tables clean, in good condition, and placed in the correct location?"}, {"id": "3.2", "text": "Is the wheelchair available and in working condition?"}, {"id": "3.3", "text": "Is the leaflet stand clean and filled with the current promotion leaflet?"}, {"id": "3.4", "text": "Is the customer service desk clean and organized (including inside)?"}, {"id": "3.5", "text": "Are shopping baskets and trolleys available, clean, and sanitized?"}, {"id": "3.6", "text": "Is the entrance to the selling area completely clear \u2014 nothing blocking it?"}, {"id": "3.7", "text": "Is the recycling machine maintained and does it have clear instructions for customers on how to use it?"}]}, {"id": "s4", "title": "Section 4 \u2014 PRODUCT AVAILABILITY", "items": [{"id": "4.1", "text": "Has the updated list of top-selling items been checked today?"}, {"id": "4.2", "text": "Are all Al Meera warehouse lines available on the shelf?"}, {"id": "4.3", "text": "Have you followed up with suppliers on pending orders? Have you informed the Commercial team about non-deliveries?"}, {"id": "4.4", "text": "Is the order schedule being followed? Have all LPOs been raised on time after the manager's review?"}, {"id": "4.5", "text": "Has the promotional order been placed and followed up?"}, {"id": "4.6", "text": "Are all current promotional items available \u2014 including in-store promotions?"}, {"id": "4.7", "text": "Have all items for the coming promotion event been received at least 2 days before it starts?"}, {"id": "4.8", "text": "Have leftover items from the previous promotional event been followed up for return?"}]}, {"id": "s5", "title": "Section 5 \u2014 PRICE INTEGRITY \u2013 ARE PRICES CORRECT?", "items": [{"id": "5.1", "text": "Is the price integrity process being followed 100% as per schedule?"}, {"id": "5.2", "text": "Has the Store Manager spot-checked 10 items per aisle today \u2014 checking that shelf labels exist and prices match the system?"}, {"id": "5.3", "text": "Has the Area Manager done a spot check of 5 items per aisle during their last visit? (Write N/A if no visit today)"}, {"id": "5.4", "text": "Has the price change been done? Have all OLD shelf labels been removed? Has the Store Manager spot-checked 5% of price changes?"}, {"id": "5.5", "text": "Has all leftover glue and old label residue been cleaned from price strips?"}, {"id": "5.6", "text": "Do all promo price signs match the leaflet and the system (POS) prices?"}, {"id": "5.7", "text": "Has the Store Manager spot-checked 5% of promo item prices?"}]}, {"id": "s6", "title": "Section 6 \u2014 EXPIRY DATE CHECKS", "items": [{"id": "6.1", "text": "Is the daily expiry check schedule being followed?"}, {"id": "6.2", "text": "Is each section stocker/merchandiser checking expiry dates on their items individually?"}, {"id": "6.3", "text": "Has the team done a group expiry check for the whole category or store?"}, {"id": "6.4", "text": "Have all expired and near-expiry items been removed from display and returned to the vendor?"}, {"id": "6.5", "text": "Has a random check been done today to confirm FEFO (First Expiry First Out) is being followed?"}]}, {"id": "s7", "title": "Section 7 \u2014 FRESH DEPARTMENTS \u2013 GENERAL", "items": [{"id": "7.1", "text": "WIBI CHECK: Would you personally buy these items? Only display items you would buy for yourself."}, {"id": "7.2", "text": "Does every fresh department have proper cleaning materials: dishwashing liquid, hand wash, maxi roll, and sponge?"}, {"id": "7.3", "text": "Is the UV sterilizing cabinet working and being used correctly?"}, {"id": "7.4", "text": "Is there a clearly marked area (red sign) for damaged and expired items?"}, {"id": "7.5", "text": "Does every fresh department have a weekly deep cleaning schedule that has been checked and signed by the Store Manager?"}, {"id": "7.6", "text": "Are all similar items displayed together? (potatoes with potatoes, tomatoes with tomatoes, etc.)"}, {"id": "7.7", "text": "Are the top-selling fresh items fully available?"}, {"id": "7.8", "text": "Are all machines working properly? (mincing machine, bone saw, slicer, ice maker, ovens, etc.)"}, {"id": "7.9", "text": "Are all floors in fresh departments always clean?"}]}, {"id": "s8", "title": "Section 8 \u2014 FRUITS & VEGETABLES (F&V)", "items": [{"id": "8.1", "text": "Are only fresh and good quality items displayed? No old, damaged, or rotten items."}, {"id": "8.2", "text": "Do all items have visible and accurate price tags?"}, {"id": "8.3", "text": "Are sellable family packs and trays always available?"}, {"id": "8.4", "text": "Are all family items displayed together and in one location?"}, {"id": "8.5", "text": "Are fresh juices and fruit cuts available? Are they made fresh daily in batches?"}, {"id": "8.6", "text": "Are the F&V stands and chillers always clean?"}, {"id": "8.7", "text": "Is the F&V weighing scale and counter always clean?"}, {"id": "8.8", "text": "Is the F&V preparation room and storage chiller always clean?"}, {"id": "8.9", "text": "Is the weekly deep cleaning for the entire F&V section done?"}, {"id": "8.10", "text": "Are all packaging and supplies available and properly stored in clean plastic containers?"}, {"id": "8.11", "text": "Are municipality prices updated on time and accurately?"}, {"id": "8.12", "text": "Is the walk-in chiller door clean? Is the temperature gauge working and showing correct readings?"}, {"id": "8.13", "text": "Are all employees wearing clean uniform, PPE (gloves, hair cover), and using clean tools?"}, {"id": "8.14", "text": "Is the personal hygiene of all F&V staff acceptable? (proper uniform, clean appearance \u2014 no informal dress allowed)"}, {"id": "8.15", "text": "Are hair and nails trimmed? Is beard shaved? Are disposable gloves being changed? Are hair and face covers being worn?"}, {"id": "8.16", "text": "Are sliced fruits and vegetables prepared daily with proper preparation date labels?"}, {"id": "8.17", "text": "Are fruits and vegetables washed and sanitized with QA approved tablets before being peeled or sliced?"}, {"id": "8.18", "text": "Is trimming and cleaning of leafy vegetables done ONLY inside \u2014 not at the back door area?"}, {"id": "8.19", "text": "Are leafy vegetables (lettuce, cauliflower, cabbage) free from insects and properly wrapped in cling film?"}, {"id": "8.20", "text": "Is the weighing area cleaned every hour? Is a foot-operated rubbish bin available?"}, {"id": "8.21", "text": "Are all sanitizing and disinfecting spray bottles available and clearly labeled?"}, {"id": "8.22", "text": "Are storage shelves free from rust?"}, {"id": "8.23", "text": "Is the walk-in chiller free from old stock?"}]}, {"id": "s9", "title": "Section 9 \u2014 BUTCHERY", "items": [{"id": "9.1", "text": "Are all pre-packed non-marinated meat items (not ground) packed with 2-day shelf life from packing date?"}, {"id": "9.2", "text": "Is all pre-packed ground meat packed with 1-day shelf life from mincing date?"}, {"id": "9.3", "text": "Is all pre-packed marinated meat and poultry packed with 1-day shelf life from marination date?"}, {"id": "9.4", "text": "Are processed items (minced meat, kofta, sausages, marinated meat) prepared in quantities for daily sales only? No old items on display."}, {"id": "9.5", "text": "Is the full marinated range available (where municipality allows)?"}, {"id": "9.6", "text": "Are processed meat items prepared only from fresh, good quality raw meat?"}, {"id": "9.7", "text": "Do all items have visible and accurate price tags?"}, {"id": "9.8", "text": "Is the mincing machine plunger available? Are cutting boards regularly cleaned with no deep cuts?"}, {"id": "9.9", "text": "Is the weekly deep cleaning of the entire Butchery section done?"}, {"id": "9.10", "text": "Are staff personal hygiene standards very good \u2014 clean uniform and PPE?"}, {"id": "9.11", "text": "Is all equipment cleaned every 2 hours?"}, {"id": "9.12", "text": "Are all packaging supplies available?"}, {"id": "9.13", "text": "Has the wastage report been checked?"}, {"id": "9.14", "text": "Is a foot-operated rubbish bin with a proper lid available and regularly cleaned?"}, {"id": "9.15", "text": "Is the QA section logbook filled in by both shifts every day and checked by the supervisor?"}, {"id": "9.16", "text": "Are the temperature log sheets and daily cleaning plan followed every day?"}, {"id": "9.17", "text": "Is the in-house meat shelf life policy displayed in the section and understood by all staff?"}, {"id": "9.18", "text": "Are only approved food-grade cleaning chemicals used inside the section?"}, {"id": "9.19", "text": "Is the use of carcass cloth to clean surfaces or machines strictly forbidden? (Write \u2713 if rule is followed)"}, {"id": "9.20", "text": "Are chilled imported carcasses properly wrapped with clean cloth?"}, {"id": "9.21", "text": "Are all hanging carcasses carrying valid slaughter tags?"}, {"id": "9.22", "text": "Is fresh meat inside the walk-in chiller not older than 2 days?"}]}, {"id": "s10", "title": "Section 10 \u2014 FISHERY", "items": [{"id": "10.1", "text": "Is the full range of pre-packed raw and marinated fish available (where municipality allows)?"}, {"id": "10.2", "text": "Are all pre-packed non-marinated fish items packed with 1-day shelf life from packing date?"}, {"id": "10.3", "text": "Are all pre-packed marinated fish items packed with 1-day shelf life from marination date?"}, {"id": "10.4", "text": "Are marinated fish items prepared in daily quantities only? No old items on display."}, {"id": "10.5", "text": "Is the ice changed every day?"}, {"id": "10.6", "text": "Are all fish items removed from display after closing and kept in the cold room with ice on top?"}, {"id": "10.7", "text": "Is the ice collecting bin clean with no algae or mould?"}, {"id": "10.8", "text": "Are fish storage crates clean with no algae or mould?"}, {"id": "10.9", "text": "Are staff maintaining good personal hygiene?"}, {"id": "10.10", "text": "Do all items have visible and accurate price tags?"}, {"id": "10.11", "text": "Is the weekly deep cleaning of the entire Fishery section done?"}, {"id": "10.12", "text": "Is all equipment cleaned every 2 hours?"}, {"id": "10.13", "text": "Are all packaging supplies available?"}, {"id": "10.14", "text": "Is fish inside the walk-in chiller not older than 2 days?"}, {"id": "10.15", "text": "Are municipality prices for fish updated on time and accurately?"}, {"id": "10.16", "text": "Is the QA section logbook filled in by both shifts every day and checked by the supervisor?"}]}, {"id": "s11", "title": "Section 11 \u2014 FRESH BAKERY", "items": [{"id": "11.1", "text": "Is the full product range available?"}, {"id": "11.2", "text": "Are all displayed items fresh and newly received?"}, {"id": "11.3", "text": "Are all in-store baked items freshly produced several times a day by following the Daily Production Sheet?"}, {"id": "11.4", "text": "Do all in-store baked items have only 1-day shelf life?"}, {"id": "11.5", "text": "Are all packaging and supplies available?"}, {"id": "11.6", "text": "Has the wastage report been checked?"}, {"id": "11.7", "text": "Are staff maintaining good personal hygiene?"}, {"id": "11.8", "text": "Do all items have visible and accurate price tags?"}, {"id": "11.9", "text": "Are all pizza topping ingredients fresh and prepared in the right quantity for daily sales? Are preparation dates tagged?"}, {"id": "11.10", "text": "Is the QA section logbook filled in by both shifts every day and checked by the supervisor?"}, {"id": "11.11", "text": "Is the weekly deep cleaning of the entire Bakery section done?"}]}, {"id": "s12", "title": "Section 12 \u2014 MERCHANDISING \u2013 SHELF STANDARDS", "items": [{"id": "12.1", "text": "Are all products well-merchandised and visible to customers?"}, {"id": "12.2", "text": "Is the category layout communicated by the Commercial team being strictly followed?"}, {"id": "12.3", "text": "Is shelf replenishment done as needed throughout the day?"}, {"id": "12.4", "text": "Are end-gondola display rules being strictly followed?"}, {"id": "12.5", "text": "Are floor display rules being strictly followed?"}, {"id": "12.6", "text": "Are plastic pallets being used for displaying goods in the selling area? (No wooden or cardboard pallets)"}, {"id": "12.7", "text": "Are plastic pallets used in the selling area clean and not dirty?"}, {"id": "12.8", "text": "Are display shelves clean? No dust on items."}]}, {"id": "s13", "title": "Section 13 \u2014 STORE CLEANLINESS", "items": [{"id": "13.1", "text": "Is the showroom clean and the warehouse clean?"}, {"id": "13.2", "text": "Is there a deep cleaning schedule in place for: F&V chiller, F&V stand, F&V baskets, F&V prep room, all cold rooms, warehouse (usually Fridays), freezers, chillers, checkouts, customer service, deli, butchery, and bakery?"}]}, {"id": "s14", "title": "Section 14 \u2014 CHECKOUTS (CASHIERS)", "items": [{"id": "14.1", "text": "Are all checkouts cleaned by the cashiers?"}, {"id": "14.2", "text": "Are cashiers arranging their checkout stand properly \u2014 pricing, cleaning, refilling?"}, {"id": "14.3", "text": "Are there no expired items on the checkout stands? (CCO team must check this)"}, {"id": "14.4", "text": "Do all items on the checkout stands have accurate price tags?"}, {"id": "14.5", "text": "Is a small rubbish bin available at each checkout for used tissues and paper?"}, {"id": "14.6", "text": "Are all reusable bags merchandised on the checkout stands?"}, {"id": "14.7", "text": "Is the area under the cashier counter deep cleaned and are electric wires properly organized?"}, {"id": "14.8", "text": "Are all staff including trolley boys carrying valid health certificates?"}]}, {"id": "s15", "title": "Section 15 \u2014 WAREHOUSE RULES", "items": [{"id": "15.1", "text": "Are all warehouse rules being strictly followed?"}]}, {"id": "s16", "title": "Section 16 \u2014 UNIFORM & STAFF SCHEDULING", "items": [{"id": "16.1", "text": "Are all team members wearing the proper uniform?"}, {"id": "16.2", "text": "Is the uniform always clean and tidy?"}, {"id": "16.3", "text": "Are all third-party team members (suppliers, vendors) wearing the proper uniform?"}, {"id": "16.4", "text": "Has the staff schedule been checked? Is there enough staff on duty during peak hours?"}]}, {"id": "s17", "title": "Section 17 \u2014 SAFETY & LOSS PREVENTION", "items": [{"id": "17.1", "text": "Are all emergency exit doors accessible and unblocked?"}, {"id": "17.2", "text": "Is the fire fighting system operational?"}, {"id": "17.3", "text": "Are fire extinguishers operational and within their expiry date?"}, {"id": "17.4", "text": "Are fire extinguishers placed in the locations agreed with civil defense?"}, {"id": "17.5", "text": "Are fire sprinklers free from any stock or assets covering them?"}, {"id": "17.6", "text": "Are CCTV cameras free from any stock or assets covering them?"}]}, {"id": "s18", "title": "Section 18 \u2014 RECEIVING & BACK ROOM", "items": [{"id": "18.1", "text": "Are visitor entry procedures being strictly followed?"}, {"id": "18.2", "text": "Is the warehouse only opened when a security person is present?"}, {"id": "18.3", "text": "Is the receiving team physically checking goods while receiving?"}, {"id": "18.4", "text": "Are fresh food goods being checked by the section supervisor for quality when received?"}, {"id": "18.5", "text": "Is the damaged and returnable items area clean and not overstocked?"}, {"id": "18.6", "text": "Are no goods blocking emergency evacuation gates, fire hoses, and fire extinguishers?"}, {"id": "18.7", "text": "Are fire extinguishers properly hanging on the walls?"}, {"id": "18.8", "text": "Are vendors who are not delivering stocks waiting outside?"}, {"id": "18.9", "text": "Are all received LPOs posted in the system on the same day?"}, {"id": "18.10", "text": "Are all received and posted LPOs/invoices reviewed by the Store Manager daily? Are there no pending invoices for the day?"}, {"id": "18.11", "text": "Are all stock transfers posted in the system on the same day?"}, {"id": "18.12", "text": "Are there no outstanding returns to vendors?"}, {"id": "18.13", "text": "Have all empty wrappers been properly recorded under known shrinkage?"}, {"id": "18.14", "text": "Has non-returnable damaged and expired stock been disposed through the system and with municipality approval?"}, {"id": "18.15", "text": "Is the back room well arranged and tidy?"}, {"id": "18.16", "text": "Are no items kept outside the store \u2014 including non-food and food items like onion, potatoes, and packaging?"}, {"id": "18.17", "text": "Is the receiving area locked after duty? Are documents and stamps kept in the safe/locker?"}, {"id": "18.18", "text": "Is the back room door kept closed when receiving is completed?"}, {"id": "18.19", "text": "Has the temperature log sheet for receiving perishable items (chilled and frozen) been checked and recorded daily?"}, {"id": "18.20", "text": "Are pest control devices in their correct positions? Is there no sign of infestation?"}, {"id": "18.21", "text": "Is the trash bin area clean? No stagnant liquids?"}, {"id": "18.22", "text": "Is the paper recycling area clean and followed up regularly to avoid overflow?"}, {"id": "18.23", "text": "Are plastic or air curtains available, switched on, and cleaned regularly?"}, {"id": "18.24", "text": "Is the receiving and LPO office clean, organized, and tidy at all times?"}, {"id": "18.25", "text": "Are all FOC (free of charge) items posted in the system with zero cost as per policy?"}]}, {"id": "s19", "title": "Section 19 \u2014 CCO \u2013 CASH OFFICE & CASHIERS", "items": [{"id": "19.1", "text": "Are the cash collection company's authorized officer details maintained?"}, {"id": "19.2", "text": "Are voids and refunds reviewed by the CCO on a daily basis?"}, {"id": "19.3", "text": "Is the void/refund key kept only with the CCO in charge \u2014 not with cashiers?"}, {"id": "19.4", "text": "Are cashiers not using their mobile phones while on duty?"}, {"id": "19.5", "text": "Is the CCO physically checking void/refund items before approving them?"}, {"id": "19.6", "text": "Have all credit card terminal reconciliations been done daily?"}, {"id": "19.7", "text": "Are safe keys kept only with the CCO in charge?"}, {"id": "19.8", "text": "Is petty cash maintained accurately with no variance found?"}, {"id": "19.9", "text": "Has any misuse of petty cash been found during audits? (Write \u2713 if NO misuse found)"}, {"id": "19.10", "text": "Is the daily Tamween reconciled and tallied with the Tamween system and SAP?"}, {"id": "19.11", "text": "Are Lost & Found records up to date?"}, {"id": "19.12", "text": "Are cashiers scanning every single item?"}, {"id": "19.13", "text": "At the end of each shift, have all cashiers reconciled their tills and handed over credit card slips/void receipts to the CCO?"}, {"id": "19.14", "text": "Has the daily sales total been checked to match total cash, credit card, and span card transactions?"}, {"id": "19.15", "text": "Are all packaging and supplies available at checkouts?"}, {"id": "19.16", "text": "Have the daily void/refunds been reviewed by the Store Manager?"}]}, {"id": "s20", "title": "Section 20 \u2014 STORE OFFICES", "items": [{"id": "20.1", "text": "Are all store offices clean, tidy, and well organized?"}, {"id": "20.2", "text": "Are all archive documents kept in their proper archive boxes?"}, {"id": "20.3", "text": "Are there no documents left on desks? All documents in drawers or in files."}, {"id": "20.4", "text": "Are all office door signages following the Al Meera design? No hand-made signs by store team."}]}]};
const AM_DATA={"id": "am", "name": "Area Manager Store Visit", "sections": [{"id": "am_s1", "title": "Parking Lot", "category": "Entrance & Greeting Area", "items": [{"id": "am_1", "text": "Parking area is clean & free of Trash"}, {"id": "am_2", "text": "Parking shades not damaged. Dustbins are not damaged and well maintained"}, {"id": "am_3", "text": "Is the trash can clear and trash bag placed in it"}, {"id": "am_4", "text": "Is there any scattered trolley in the Parking."}, {"id": "am_5", "text": "Store Entrance doors are clean, operating and well maintained, closed automatically provided with air curtain."}, {"id": "am_6", "text": "Parking Signs are available and in good condition."}, {"id": "am_7", "text": "Qatar Flag is available and not damaged."}, {"id": "am_8", "text": "Issues are reported and tickets are available for pending tasks"}]}, {"id": "am_s2", "title": "Security Guard", "category": "Entrance & Greeting Area", "items": [{"id": "am_9", "text": "Is the security guard available at the entrance and exit"}, {"id": "am_10", "text": "Is the baggage counter clean and arranged"}, {"id": "am_11", "text": "Tokens available for the customer baggage"}, {"id": "am_12", "text": "Security is managing the tokens for the Bottle refilling"}, {"id": "am_13", "text": "Staff handbags and purchases randomly checked during all shifts"}]}, {"id": "am_s3", "title": "Store Entrance & Al Meera Mall Area", "category": "Entrance & Greeting Area", "items": [{"id": "am_14", "text": "Entrance is clean, clutter free, and unobstructed."}, {"id": "am_15", "text": "Trash Cans are deep cleaned and trash bags are replaced as necessary."}, {"id": "am_16", "text": "Shopping carts and baskets free of trash, clean, in good working condition."}, {"id": "am_17", "text": "Wheel Chair is available for the customer in need and is clean and working properly."}, {"id": "am_18", "text": "No shopping carts used by supplier and consignee."}, {"id": "am_19", "text": "Customer Restroom are always clean. Toilet rolls, hand soap, and hand dryer must be in good working condition. Ensure the cleaning schedule is filled."}, {"id": "am_20", "text": "Mall Signages and Directional signage is in place and in good condition"}]}, {"id": "am_s4", "title": "Signages on front glass and Entry Glass door", "category": "Entrance & Greeting Area", "items": [{"id": "am_21", "text": "Is the Store Timings  sign visible on the entry door?"}, {"id": "am_22", "text": "Are signages on the front glass visible both sides?"}, {"id": "am_23", "text": "Are signages  in good condition?"}]}, {"id": "am_s5", "title": "Backyard and Receiving area", "category": "Entrance & Greeting Area", "items": [{"id": "am_24", "text": "Garbage container area is clean, Cartons cage is properly controlled (only carton is allowed and need to be folded)"}, {"id": "am_25", "text": "Outside Receiving are is clean, free of trash, and organized including empty grates and pallets"}, {"id": "am_26", "text": "Transit area is properly arranged, cleaned and cleared from any obstacles"}]}, {"id": "am_s6", "title": "Checkout stands and Front lanes", "category": "Checkout & Bagging Station", "items": [{"id": "am_27", "text": "Counter is clean and tidy"}, {"id": "am_28", "text": "Shopping bags, POS Roll, Credit Card Machine rolls are available on the counter"}, {"id": "am_29", "text": "Checkout stands are cleaned, refilled, and priced"}, {"id": "am_30", "text": "Checkout Stands, Monitors, Keyboards, Belt, base, drawers are cleaned and in working condition."}, {"id": "am_31", "text": "Is the Cashier using disinfectant to sanitize the checkout belt and other touch points"}]}, {"id": "am_s7", "title": "Signages at the Checkout", "category": "Checkout & Bagging Station", "items": [{"id": "am_32", "text": "Are the cash tills organized?"}, {"id": "am_33", "text": "Are signages at the checkouts clean & in good condition?"}, {"id": "am_34", "text": "Are there any pending returns?"}, {"id": "am_35", "text": "Is there any old and irrelevant signage not removed from the checkout"}, {"id": "am_36", "text": "Is the exchange rate for the Foreign Currency updated?"}, {"id": "am_37", "text": "Is the Less than 10 Items signage available and counter operational"}, {"id": "am_38", "text": "Is self checkout counter operational"}, {"id": "am_39", "text": "Is CCO encouraging the customer to use self checkouts"}, {"id": "am_40", "text": "Is the security monitoring for any wrong doings by the customer at self checkout"}]}, {"id": "am_s8", "title": "Customer Service \u2013 POS Area", "category": "Checkout & Bagging Station", "items": [{"id": "am_41", "text": "Is the cashier wishing the customer?"}, {"id": "am_42", "text": "Is there trolley boys on all counters and helping the customers"}, {"id": "am_43", "text": "CCO is opening the counter if  more than 2 trolleys in waiting"}, {"id": "am_44", "text": "Backup cashiers are available in the store."}, {"id": "am_45", "text": "Trolley boys are helping the customers to drop the items to the car"}]}, {"id": "am_s9", "title": "Check out Supplies/ Bagging techniques", "category": "Checkout & Bagging Station", "items": [{"id": "am_46", "text": "Trolley Boy following correct bagging techniques (food Vs non food, bulk merchandise) ?"}, {"id": "am_47", "text": "Does cashier have appropriate quantities of bags and change to offer to the customer"}, {"id": "am_48", "text": "Is CCO monitoring the usage of Shopping Bags consumption"}]}, {"id": "am_s10", "title": "Cashiers Follow up", "category": "Checkout & Bagging Station", "items": [{"id": "am_49", "text": "The cashiers are aware and know how to proceed for Vodafone, Ooredoo, Gaming cards and Tamween."}, {"id": "am_50", "text": "Is the Cashier promoting the Al Meera Reusable ECO Bag"}, {"id": "am_51", "text": "Is the Store taking an initiative for plus sale at the checkout and cashier is pushing the sales"}]}, {"id": "am_s11", "title": "Cash Office Process", "category": "Cash Office & Cashiering Process", "items": [{"id": "am_52", "text": "CCO Supervisor shift handover procedure (forms been filled accurately in each shift)"}, {"id": "am_53", "text": "Cashiers cash control process (forms filled and maintained daily basis)"}, {"id": "am_54", "text": "Cash collection company's Authorized officer details maintained"}, {"id": "am_55", "text": "Void/Refunds been reviewed daily basis"}, {"id": "am_56", "text": "Is void/refund swipe card kept with CCO in charge not with cashier"}, {"id": "am_57", "text": "CCO is physically checking the void/refund items before approving it"}, {"id": "am_58", "text": "Float Cash are maintained accurately and no variance found"}, {"id": "am_59", "text": "Petty cash money not mixed with other safe money and kept separately with required documents & invoices"}, {"id": "am_60", "text": "Lost & Found records is maintained up to date and lost and found cash is maintained and send to security with proper details."}, {"id": "am_61", "text": "Any cash received in any form apart from sales been deposited separately in the bank."}, {"id": "am_62", "text": "Cashier excess short is maintained and excess is deposited to the bank"}, {"id": "am_63", "text": "Store GM/SM reviews the daily void/refunds."}]}, {"id": "am_s12", "title": "Coins Change & Refund", "category": "Cash Office & Cashiering Process", "items": [{"id": "am_64", "text": "In the store there are enough coins & change for all checkouts"}, {"id": "am_65", "text": "All denomination of change available in the store"}, {"id": "am_66", "text": "CCO Supervisor know the refund conditions and process"}, {"id": "am_67", "text": "CCO Supervisor know the required documents for refund"}, {"id": "am_68", "text": "Item for refund is verified & approved by the section supervisor"}, {"id": "am_69", "text": "Refunded Item is handed over to the section in-charge and document is maintained at customer service"}, {"id": "am_70", "text": "Security verifies the item for refund"}]}, {"id": "am_s13", "title": "Tamween", "category": "Cash Office & Cashiering Process", "items": [{"id": "am_71", "text": "Daily Tamween is tallied System Vs physical and Tamween Machine Vs Physical by CCO"}, {"id": "am_72", "text": "Daily Tamween Physical Vs System report is sent to HO"}, {"id": "am_73", "text": "There are no Short or Excess Tamween SKU's"}]}, {"id": "am_s14", "title": "Cashier Spot Check", "category": "Cash Office & Cashiering Process", "items": [{"id": "am_74", "text": "Daily 2 in Each Shift Spot Checks are conducted"}, {"id": "am_75", "text": "Excess and short are filed"}, {"id": "am_76", "text": "Unusual Excess and Short are investigated by the Store Manager & Security"}, {"id": "am_77", "text": "Excess Cash is deposited everyday in the bank"}, {"id": "am_78", "text": "Shorts are recovered from the cashier by EOD"}, {"id": "am_79", "text": "No adjustment of excess and short is done from the petty cash - CRITICAL"}]}, {"id": "am_s15", "title": "Trolley & Trolley Boys", "category": "Cash Office & Cashiering Process", "items": [{"id": "am_80", "text": "Is CCO maintaining daily attendance of Trolley Boys"}, {"id": "am_81", "text": "Is the Trolley & Baskets counted & Tallied daily"}, {"id": "am_82", "text": "Is there a register maintained to maintain the daily Trolley 7 Basket count before closing store"}]}, {"id": "am_s16", "title": "Fruits & Vegetables", "category": "Selling Area - Fresh Food", "items": [{"id": "am_83", "text": "Is there any bad quality/rotten/fungus in the display area"}, {"id": "am_84", "text": "Is Ministry Price change updated in the Signage and in weighing machine"}, {"id": "am_85", "text": "Is the store following basic planogram in Fruits and Veg"}, {"id": "am_86", "text": "Is the entry level items available"}, {"id": "am_87", "text": "Is the store following up daily on the item OOS with commercial"}, {"id": "am_88", "text": "Is the SM/Fresh Food Manager checking the section in every 2 - 4 hours and taking corrective actions for bad quality items in display"}, {"id": "am_89", "text s / shelf labels"}, {"id": "fv_18", "text": "Municipality price changes implemented on same day of notification", "critical": true}, {"id": "fv_19", "text": "Weighing scale price labels accurate and match shelf tag and POS price"}, {"id": "fv_20", "text": "Promotional items have correct promo signage matching the current leaflet"}, {"id": "fv_21", "text": "Top-selling F&V items fully stocked during business hours"}, {"id": "fv_22", "text": "Sellable family packs / pre-packed trays available at all times"}, {"id": "fv_23", "text": "Fresh juices and cut fruits (where municipality permit held) available and prepared daily"}, {"id": "fv_24", "text": "Sliced/cut produce carries preparation date label and is prepared on same day only", "critical": true}]}]}, {"id": "fv_s3", "title": "Section 3 \u2014 PREPARATION ROOM & BACK-ROOM OPERATIONS", "subsections": [{"title": "General", "items": [{"id": "fv_25", "text": "Preparation room temperature maintained between 10\u00b0C \u2013 15\u00b0C (check digital gauge)", "critical": true}, {"id": "fv_26", "text": "Trimming and cleaning of leafy vegetables NOT performed at the back-door area", "critical": true}, {"id": "fv_27", "text": "Cut fruits/vegetables washed and sanitized with chlorine tablets before slicing", "critical": true}, {"id": "fv_28", "text": "Separate cutting boards used for different produce types (color-coded)"}, {"id": "fv_29", "text": "No wooden tools, wooden pallets, or cardboard used on food contact surfaces"}, {"id": "fv_30", "text": "Packaging materials stored on shelves \u2014 not on the floor"}, {"id": "fv_31", "text": "Quantities prepared limited to daily sales need \u2014 no old cut produce kept overnight"}, {"id": "fv_32", "text": "All preparation tools (knives, boards, slicers, bowls) clean and sanitized"}, {"id": "fv_33", "text": "UV sterilizing cabinet operational and used correctly for tool sanitation"}, {"id": "fv_34", "text": "Weighing scale in preparation room is clean, calibrated, and functioning"}, {"id": "fv_35", "text": "Foot-operated trash bin with lid available and emptied regularly"}, {"id": "fv_36", "text": "All sanitizing spray bottles available, labeled, and containing correct chemicals"}, {"id": "fv_37", "text": "Preparation room floors, walls, ceiling clean \u2014 no standing water"}, {"id": "fv_38", "text": "Weighing and packing area cleaned on an hourly basis"}, {"id": "fv_39", "text": "Only QA-approved food-grade cleaning chemicals in use \u2014 no unauthorized products"}, {"id": "fv_40", "text": "Deep cleaning schedule for preparation room is in place and being followed"}]}]}, {"id": "fv_s4", "title": "Section 4 \u2014 WALK-IN CHILLER \u2013 STORAGE & COLD CHAIN", "subsections": [{"title": "General", "items": [{"id": "fv_41", "text": "Walk-in chiller temperature logged twice daily (target: 1\u00b0C \u2013 8\u00b0C for F&V)", "critical": true}, {"id": "fv_42", "text": "Temperature gauge/display is working and giving correct readings", "critical": true}, {"id": "fv_43", "text": "Chiller door gasket intact; no warm air entry; door kept closed when not in use"}, {"id": "fv_44", "text": "Plastic curtain / air curtain is clean and in switch-on mode"}, {"id": "fv_45", "text": "FEFO/FIFO strictly followed \u2014 new stock placed behind old stock"}, {"id": "fv_46", "text": "All items inside the chiller tagged with date of receiving"}, {"id": "fv_47", "text": "No more than 1.5 days' sales stock in the walk-in chiller \u2014 no old stock build-up", "critical": true}, {"id": "fv_48", "text": "Damaged / near-expiry / waste items in clearly marked designated area, separated from good stock"}, {"id": "fv_49", "text": "No expired produce present in the chiller", "critical": true}, {"id": "fv_50", "text": "No items stored directly under the cooling/evaporator unit (condensation drip risk)"}, {"id": "fv_51", "text": "Chiller floor, walls, ceiling, and shelving clean \u2014 no mold, odors, or debris"}, {"id": "fv_52", "text": "Evaporator unit/coils clean \u2014 no ice build-up or blockage"}, {"id": "fv_53", "text": "Chiller door, handle, hinges, and plastic curtain are clean"}, {"id": "fv_54", "text": "Weekly deep cleaning of chiller is scheduled, performed, and documented"}]}]}, {"id": "fv_s5", "title": "Section 5 \u2014 DISPLAY STANDS, SCALES & SECTION EQUIPMENT", "subsections": [{"title": "General", "items": [{"id": "fv_55", "text": "F&V stands/bins clean, free of debris, and not damaged"}, {"id": "fv_56", "text": "Display chiller units (if applicable) clean and at correct temperature"}, {"id": "fv_57", "text": "Storage shelves are rust-free \u2014 no rust on racks or display structures"}, {"id": "fv_58", "text": "Customer-facing weigh station scales are clean and calibrated"}, {"id": "fv_59", "text": "Scale counter area cleaned on hourly basis"}, {"id": "fv_60", "text": "Section lighting adequate \u2014 all bulbs operational"}, {"id": "fv_61", "text": "Directional signage and product category signage present, clean, and in good condition"}, {"id": "fv_62", "text": "Promotional POS materials and pricing boards current and accurate"}]}]}, {"id": "fv_s6", "title": "Section 6 \u2014 PEST CONTROL", "subsections": [{"title": "General", "items": [{"id": "fv_63", "text": "No signs of insect, rodent, or bird activity in the F&V section or cold room", "critical": true}, {"id": "fv_64", "text": "Insect light traps (ILT) / fly traps operational, cleaned, and in correct position"}, {"id": "fv_65", "text": "No pest traps relocated during cleaning \u2014 all traps in designated marked positions"}, {"id": "fv_66", "text": "No gaps between doors and floor; no holes in walls or ceiling that allow pest entry"}, {"id": "fv_67", "text": "Back-door area clear of rotting produce which attracts pests"}]}]}, {"id": "fv_s7", "title": "Section 7 \u2014 SECTION CLEANLINESS & DEEP CLEANING", "subsections": [{"title": "General", "items": [{"id": "fv_68", "text": "Section floors clean and dry at all times \u2014 no standing water, slippery surfaces, or debris"}, {"id": "fv_69", "text": "All waste bins are foot-operated type, covered, and emptied as needed"}, {"id": "fv_70", "text": "Packaging waste and cartons removed from section floor immediately"}, {"id": "fv_71", "text": "No wet cardboard or soggy packaging in display areas (promotes mold/bacteria)", "critical": true}, {"id": "fv_72", "text": "Weekly deep cleaning schedule in place for F&V stands, chillers, baskets, scales, and prep room"}, {"id": "fv_73", "text": "Deep cleaning schedule signed off by Store Manager weekly"}, {"id": "fv_74", "text": "Cleaning tools (green pads, hard brushes, plastic-handled scrubbers) available and stored correctly"}, {"id": "fv_75", "text": "Only approved food-grade chemicals used in the section"}]}]}, {"id": "fv_s8", "title": "Section 8 \u2014 RECEIVING \u2013 QUALITY CHECK AT INTAKE", "subsections": [{"title": "General", "items": [{"id": "fv_76", "text": "F&V supervisor or designee present during all F&V deliveries", "critical": true}, {"id": "fv_77", "text": "Quality check performed at receiving: freshness, quality, packaging integrity, and chilled item temperature", "critical": true}, {"id": "fv_78", "text": "Vehicle temperature recorded for chilled deliveries; non-compliant loads rejected"}, {"id": "fv_79", "text": "No item accepted with less than 75% remaining shelf life at time of delivery"}, {"id": "fv_80", "text": "All received items have valid production date; expiry date checked at gate"}, {"id": "fv_81", "text": "Receiving quantities verified against LPO \u2014 no cost-discrepancy receipts without approval"}, {"id": "fv_82", "text": "Temperature log for perishable receiving filled daily"}, {"id": "fv_83", "text": "Municipality prices for F&V implemented immediately upon notification \u2014 no delay", "critical": true}, {"id": "fv_84", "text": "All FOC items posted in system as FOC \u2014 no unrecorded receipts"}, {"id": "fv_85", "text": "Delivery documentation (LPO, invoice, receiving sheet) filed and available for review"}]}]}, {"id": "fv_s9", "title": "Section 9 \u2014 WASTAGE MANAGEMENT & SHRINKAGE CONTROL", "subsections": [{"title": "General", "items": [{"id": "fv_86", "text": "Supervisor/SM checks quality every 2\u20134 hours and removes poor-quality items from display", "critical": true}, {"id": "fv_87", "text": "Daily wastage target vs. actual is known by the F&V supervisor"}, {"id": "fv_88", "text": "Wastage recorded at the correct PLU code \u2014 no misposting"}, {"id": "fv_89", "text": "Waste report printed daily and reviewed by Store Manager"}, {"id": "fv_90", "text": "Returns vs. waste clearly separated \u2014 returnable items not posted as waste"}, {"id": "fv_91", "text": "Wastage disposal done under security supervision and per Baladiya/municipality norms", "critical": true}, {"id": "fv_92", "text": "Excess or unusual wastage has documented root cause and corrective action on record"}, {"id": "fv_93", "text": "Physical stock in display and cold room reconciles with system stock \u2014 discrepancies investigated"}, {"id": "fv_94", "text": "Near-expiry / unsellable produce identified and actioned (markdown/donation/dispose) on time"}, {"id": "fv_95", "text": "Empty wrappers for high-value F&V items recorded under known shrinkage"}]}]}, {"id": "fv_s10", "title": "Section 10 \u2014 ORDERING & STOCK MANAGEMENT", "subsections": [{"title": "General", "items": [{"id": "fv_96", "text": "Order schedule in place and followed daily by the section supervisor"}, {"id": "fv_97", "text": "Order quantities based on physical stock check (not assumption) before ordering"}, {"id": "fv_98", "text": "Out-of-stock (OOS) items followed up with commercial/supplier daily"}, {"id": "fv_99", "text": "Promo order raised 2 days before the start of the promotional event"}, {"id": "fv_100", "text": "All LPOs raised as per schedule and verified by Store Manager before submission"}, {"id": "fv_101", "text": "SOH in system reviewed against physical count minimum once per week"}, {"id": "fv_102", "text": "No overstocking of short-shelf-life items \u2014 ordering calibrated to daily sales velocity"}, {"id": "fv_103", "text": "Slow-moving and aging F&V stocks identified and actioned before becoming waste"}]}]}, {"id": "fv_s11", "title": "Section 11 \u2014 RECORDS, LOGS & DOCUMENTATION", "subsections": [{"title": "General", "items": [{"id": "fv_104", "text": "Temperature log for walk-in chiller updated twice daily (morning and afternoon)", "critical": true}, {"id": "fv_105", "text": "Temperature log for display chillers/units maintained"}, {"id": "fv_106", "text": "Daily cleaning schedule completed, signed, and available (last 4 weeks)"}, {"id": "fv_107", "text": "Weekly deep cleaning records signed off by Store Manager"}, {"id": "fv_108", "text": "Receiving quality check records available (last 7 days minimum)"}, {"id": "fv_109", "text": "Wastage/disposal records maintained and match system postings"}, {"id": "fv_110", "text": "QA section logbook completed by BOTH shifts daily and verified by section supervisor"}, {"id": "fv_111", "text": "Previous audit findings documented with corrective action owner and target date"}, {"id": "fv_112", "text": "Pest control service records available; last service within schedule"}]}]}, {"id": "fv_s12", "title": "Section 12 \u2014 STAFF KNOWLEDGE & TRAINING", "subsections": [{"title": "General", "items": [{"id": "fv_113", "text": "Staff correctly state shelf life policy for cut fruits and sliced vegetables"}, {"id": "fv_114", "text": "Staff know correct chiller temperature range for F&V storage"}, {"id": "fv_115", "text": "Staff understand WIBI principle and can apply it to display decisions"}, {"id": "fv_116", "text": "Staff know escalation procedure if municipality inspector arrives"}, {"id": "fv_117", "text": "Staff know correct process for handling customer complaints on F&V quality"}, {"id": "fv_118", "text": "F&V Supervisor has attended food safety/hygiene training within last 12 months"}, {"id": "fv_119", "text": "Training records for section staff available and up-to-date"}]}]}]};

const DB={get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}}; 
function useDB(k,d){const[v,sv]=useState(()=>DB.get(k,d));const save=nv=>{const val=typeof nv==="function"?nv(v):nv;DB.set(k,val);sv(val);};return[v,save];}
function getItemsFlat(sec){if(sec.items)return sec.items;if(sec.subsections)return sec.subsections.flatMap(s=>s.items||[]);return[];}
function calcScore(checklist,answers){const sc=checklist.scoring;let total=0,max=0,notOk=0,critFails=0,naCount=0;for(const item of checklist.sections.flatMap(getItemsFlat)){const ans=answers[item.id];const pts=(sc==="qa"||sc==="fv")?(item.score||2):2;if(ans==="na"){naCount++;continue;}if(!ans)continue;max+=pts;if(ans==="full"){total+=pts;}else if(ans==="partial"){if(pts===2)total+=1;notOk++;}else{notOk++;if(item.critical)critFails++;}}const pct=max>0?Math.round((total/max)*100):0;return{total,max,pct,notOk,critFails,naCount,rating:getRating(pct)};}
function hexRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}

async function makePDF(checklist,store,role,answers,comments,photos,visitInfo){
  if(!window.jspdf){await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const score=calcScore(checklist,answers);const ML=14,MR=196;let y=15;
  const chk=(h2=8)=>{if(y+h2>272){doc.addPage();y=15;}};
  doc.setFillColor(0,81,51);doc.rect(0,0,210,30,"F");
  try{doc.addImage(LOGO,"PNG",ML,4,22,22);}catch(e){}
  doc.setFont("helvetica","bold");doc.setFontSize(14);doc.setTextColor(255,255,255);
  doc.text("AL MEERA CONSUMER GOODS",42,12);doc.setFontSize(10);doc.text(checklist.name.toUpperCase(),42,19);
  doc.setFontSize(8);doc.setTextColor(210,240,180);
  doc.text(`Store: ${store.name} (${store.code})  |  Date: ${visitInfo.date}  |  ${role.name}: ${visitInfo.auditorName}`,42,26);y=38;
  if(visitInfo.visitType){doc.setFontSize(8);doc.setTextColor(80,80,80);doc.text(`Visit Type: ${visitInfo.visitType}  |  Start: ${visitInfo.startTime||""}  |  SM on Duty: ${visitInfo.smOnDuty||""}`,ML,y);y+=6;}
  const r=score.rating;doc.setFillColor(...hexRgb(r.color));doc.rect(ML,y,MR-ML,12,"F");

  return h(Wrap,null,

      h("img",{src:LOGO,style:{width:56,height:56,borderRadius:10,objectFit:"contain",background:"white",padding:4,marginBottom:10},alt:""}),
      h("div",{style:{color:"white",fontWeight:"bold",fontSize:20}},"Al Meera ",h("span",{style:{color:C.lime}},"Operations")),
      h("div",{style:{color:"rgba(255,255,255,0.65)",fontSize:12,marginTop:3}},"Select your role to begin")),
    h("div",{style:{padding:14}},
      active.map(r=>h(Card,{key:r.id,onClick:()=>onSelect(r),style:{borderLeft:`4px solid ${C.green}`,display:"flex",alignItems:"center",gap:14,padding:14}},
        h("span",{style:{fontSize:30}},r.icon),
        h("div",{style:{flex:1}},h("div",{style:{fontWeight:"bold",color:C.green,fontSize:16}},r.name),h("div",{style:{color:C.muted,fontSize:11}},"Tap to continue")),
        h("span",{style:{color:C.lime,fontSize:22}},"›"))),
      h("div",{style:{display:"flex",justifyContent:"center",gap:20,marginTop:14}},
        h("button",{onClick:()=>onSelect({id:"history"}),style:{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer",textDecoration:"underline"}},"📋 History"),
        h("button",{onClick:()=>onSelect({id:"admin"}),style:{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer",textDecoration:"underline"}},"⚙️ Settings"))));
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const[formats,setFormats]=useDB("almeera_formats",DEFAULT_FORMATS);
  const[stores,setStores]=useDB("almeera_stores",ALL_STORES_DEFAULT);
  const[roles,setRoles]=useDB("almeera_roles",DEFAULT_ROLES);
  const[checklists,setChecklists]=useDB("almeera_checklists",DEFAULT_CHECKLISTS);
  const[smPins,setSmPins]=useDB("almeera_sm_pins",Object.fromEntries(ALL_STORES_DEFAULT.map(s=>[s.id,"1234"])));
  const[screen,setScreen]=useState("splash");
  const[role,setRole]=useState(null);
  const[store,setStore]=useState(null);
  const[format,setFormat]=useState(null);
  const[checklist,setChecklist]=useState(null);
  const[answers,setAnswers]=useState({});
  const[comments,setComments]=useState({});
  const[photos,setPhotos]=useState({});
  const[visitInfo,setVisitInfo]=useState(null);
  const[step,setStep]=useState(null);

  const goRole=()=>{setScreen("role");setStep(null);setRole(null);setStore(null);setFormat(null);};
  const saveAndResults=(ans,comm,ph)=>{
    setAnswers(ans);setComments(comm);setPhotos(ph);
    const sc=calcScore(checklist,ans);
    const hist=DB.get("almeera_history",[]).filter(h=>h.ts>Date.now()-30*24*60*60*1000);
    hist.unshift({ts:Date.now(),storeName:store.name,storeCode:store.code,roleId:role.id,roleLabel:role.name,auditorName:visitInfo?.auditorName||"",dateStr:visitInfo?.date||"",visitType:visitInfo?.visitType||"",pct:sc.pct,notOk:sc.notOk,critFails:sc.critFails,color:sc.rating.color,ratingLabel:sc.rating.label,photoCount:Object.values(ph||{}).filter(Boolean).length});
    DB.set("almeera_history",hist.slice(0,300));
    setScreen("results");
  };

  if(screen==="splash")return h(Splash,{onTap:()=>setScreen("role")});
  if(screen==="history")return h(History,{onBack:goRole});
  if(screen==="admin")return h(Admin,{onBack:goRole,formats,setFormats,stores,setStores,roles,setRoles,checklists,setChecklists,smPins,setSmPins});
  if(screen==="results")return h(ResultsScreen,{role,store,checklist,answers,comments,photos,visitInfo,onBack:()=>setScreen("checklist_resume"),onNew:()=>{setAnswers({});setComments({});setPhotos({});goRole();}});

  if(screen==="role")return h(RoleScreen,{roles,onSelect:r=>{
    if(r.id==="history"){setScreen("history");return;}
    if(r.id==="admin"){setScreen("admin");return;}
    setRole(r);
    if(r.id==="am"){setScreen("am_entry");return;}
    if(r.id==="fd_h"||r.id==="fd_s"){setStep("pin_fd");setScreen("flow");return;}
    setStep("format");setScreen("flow");
  }});

  if(screen==="am_entry")return h(Wrap,null,h(Hdr,{title:"Area Manager",onBack:goRole,sub:"Select an option"}),
    h("div",{style:{padding:14}},
      h(Card,{onClick:()=>{setStep("format");setScreen("flow");},style:{borderLeft:`4px solid ${C.green}`,display:"flex",alignItems:"center",gap:14,padding:14}},h("span",{style:{fontSize:28}},"📋"),h("div",{style:{flex:1}},h("div",{style:{fontWeight:"bold",color:C.green,fontSize:15}},"Store Visit"),h("div",{style:{color:C.muted,fontSize:11}},"Start a new store visit checklist")),h("span",{style:{color:C.lime,fontSize:22}},"›")),
      h(Card,{onClick:()=>{setStep("am_dash");setScreen("flow");},style:{borderLeft:"4px solid #1a5c8a",display:"flex",alignItems:"center",gap:14,padding:14}},h("span",{style:{fontSize:28}},"📊"),h("div",{style:{flex:1}},h("div",{style:{fontWeight:"bold",color:"#1a5c8a",fontSize:15}},"Dashboard"),h("div",{style:{color:C.muted,fontSize:11}},"SM Walks · QA Visits · AM Visits")),h("span",{style:{color:C.lime,fontSize:22}},"›"))));

  if(screen==="flow"){
    if(step==="pin_fd")return h(NumPad,{title:role.name,subtitle:"Enter your PIN",icon:role.icon,onBack:goRole,onSubmit:(pin,_,onErr)=>{if(pin===role.pin)setStep("fd_done");else onErr&&onErr();}});
    if(step==="fd_done")return h(Wrap,null,h(Hdr,{title:role.name,onBack:goRole}),h("div",{style:{padding:14}},h(Card,null,h("div",{style:{textAlign:"center",padding:20,color:C.muted}},"Format Director dashboard coming soon. This role is enabled and authenticated."))));
    if(step==="am_dash")return h(AMDashboard,{stores,formats,onBack:()=>setScreen("am_entry"),onStartVisit:s=>{setStore(s);setStep("visitInfo");}});

    if(role?.id==="sm"){
      if(step==="format")return h(FmtScreen,{formats,onBack:goRole,onSelect:f=>{setFormat(f);setStep("store");}});
      if(step==="store")return h(StoreScreen,{stores,format,onBack:()=>setStep("format"),onSelect:s=>{setStore(s);setStep("pin");}});
      if(step==="pin"){
        const isDef=(smPins[store.id]||"1234")==="1234";
        return h(NumPad,{title:"Store Manager",subtitle:`${store?.name} (${format?.name})`,icon:"🏪",hint:isDef?"⚠ Default PIN — you will be asked to set a new one":null,onBack:()=>setStep("store"),
          onSkip:()=>{const cl=checklists.find(c=>c.roleId==="sm"&&c.enabled);if(cl){setChecklist(cl.data);setVisitInfo({auditorName:"Store Manager",date:new Date().toLocaleDateString("en-GB").replace(/\//g,"/"),startTime:"",visitType:"",smOnDuty:""});setStep("checklist");}},
          onSubmit:(pin,isNew,onErr)=>{
            if(isNew){setSmPins(prev=>({...prev,[store.id]:pin}));const cl=checklists.find(c=>c.roleId==="sm"&&c.enabled);if(cl){setChecklist(cl.data);setVisitInfo({auditorName:"Store Manager",date:new Date().toLocaleDateString("en-GB").replace(/\//g,"/"),startTime:"",visitType:"",smOnDuty:""});setStep("checklist");}}
            else{const correct=smPins[store.id]||"1234";if(pin===correct){const cl=checklists.find(c=>c.roleId==="sm"&&c.enabled);if(cl){setChecklist(cl.data);setVisitInfo({auditorName:"Store Manager",date:new Date().toLocaleDateString("en-GB").replace(/\//g,"/"),startTime:"",visitType:"",smOnDuty:""});setStep("checklist");}}else{onErr&&onErr();}}}});
      }
      if(step==="checklist"&&checklist)return h(ChecklistScreen,{role,store,checklist,visitInfo,onBack:()=>setStep("pin"),onComplete:saveAndResults});
    }

    if(role?.id==="am"){
      if(step==="format")return h(FmtScreen,{formats,onBack:()=>setScreen("am_entry"),onSelect:f=>{setFormat(f);setStep("pin");}});
      if(step==="pin"){const amRole=roles.find(r=>r.id==="am");return h(NumPad,{title:"Area Manager",subtitle:format?.name,icon:"📋",onBack:()=>setStep("format"),onSubmit:(pin,_,onErr)=>{if(pin===(amRole?.pin||"5678"))setStep("store");else onErr&&onErr();}});}
      if(step==="store")return h(StoreScreen,{stores,format,onBack:()=>setStep("pin"),title:"Select Store to Visit",onSelect:s=>{setStore(s);setStep("visitInfo");}});
      if(step==="visitInfo")return h(VisitInfoScreen,{role,store,onBack:()=>setStep("store"),onContinue:info=>{const cl=checklists.find(c=>c.roleId==="am"&&c.enabled);if(cl){setChecklist(cl.data);setVisitInfo(info);setStep("checklist");}else alert("No enabled AM checklist.");}});
      if(step==="checklist"&&checklist)return h(ChecklistScreen,{role,store,checklist,visitInfo,onBack:()=>setStep("visitInfo"),onComplete:saveAndResults});
    }

    if(role?.id==="qa"||role?.id==="fv"){
      if(step==="format"){
        const qRole=roles.find(r=>r.id===role.id);
        return h(NumPad,{title:role.name,subtitle:"Enter your PIN",icon:role.icon,onBack:goRole,onSubmit:(pin,_,onErr)=>{if(pin===(qRole?.pin||"9999"))setStep("fmt_select");else onErr&&onErr();}});
      }
      if(step==="fmt_select")return h(FmtScreen,{formats,onBack:()=>setStep("format"),onSelect:f=>{setFormat(f);setStep("store");}});
      if(step==="store")return h(StoreScreen,{stores,format,onBack:()=>setStep("fmt_select"),title:"Select Store to Audit",onSelect:s=>{setStore(s);setStep("visitInfo");}});
      if(step==="visitInfo")return h(VisitInfoScreen,{role,store,onBack:()=>setStep("store"),onContinue:info=>{const cl=checklists.find(c=>c.roleId===role.id&&c.enabled);if(cl){setChecklist(cl.data);setVisitInfo(info);setStep("checklist");}else alert(`No enabled checklist for ${role.name}.`);}});
      if(step==="checklist"&&checklist)return h(ChecklistScreen,{role,store,checklist,visitInfo,onBack:()=>setStep("visitInfo"),onComplete:saveAndResults});
    }
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));

</script>
</body>
</html>
